name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present --filter !@dam-link/web lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Bring up test services
        run: pnpm test:services:up

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker exec dam-link-postgres-test pg_isready -U dam -d dam_link_test && break
            sleep 1
          done

      - name: Migrate
        env:
          DATABASE_URL: postgres://dam:dam@localhost:5433/dam_link_test
        run: pnpm db:migrate

      - name: Test
        env:
          DATABASE_URL: postgres://dam:dam@localhost:5433/dam_link_test
          S3_ENDPOINT: http://localhost:9003
          S3_REGION: us-east-1
          S3_ACCESS_KEY: dam
          S3_SECRET_KEY: dams3cret
          S3_BUCKET: dam-link-test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

      - name: Teardown test services
        if: always()
        run: pnpm test:services:down

  docker-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --tag dam-link-api:ci-${{ github.sha }} \
            --load \
            .

      - name: Image size
        run: docker images dam-link-api:ci-${{ github.sha }} --format "{{.Size}}"
